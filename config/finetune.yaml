    batch_size: 0
    finetune_lr: 0.001
    lambda_proto: 1
    lambda_act: 0.1
    trade_off: 0.1
    num_instances_per_class: 0
    n_train: 1
  # 【新增配置】添加Citeseer数据集的微调超参数
  # 参数参考Cora设置，因为它们都是引文网络，具有相似的特性
  # 【修复】将训练轮数从100增加到1000，早停从20增加到200，与Cora保持一致
  # 原因：100轮训练太少，导致模型过早收敛到100%准确率（可能是局部最优或过拟合）
  citeseer:
    finetune_dataset: citeseer
    normalize: none
    finetune_epochs: 1000
    early_stop: 200
    batch_size: 0
    finetune_lr: 0.001
    lambda_proto: 1
    lambda_act: 0.1
    trade_off: 0.1
